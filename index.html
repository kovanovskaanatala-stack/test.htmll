<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест: Эксперт по восстановлению волос — Hairy Course</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #222222;
            --tg-theme-button-color: #2481cc;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-hint-color: #999999;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .progress-bar {
            height: 6px;
            background-color: var(--tg-theme-hint-color);
            opacity: 0.3;
            border-radius: 3px;
            margin-bottom: 20px;
        }
        .progress-fill {
            height: 100%;
            background-color: var(--tg-theme-button-color);
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s;
        }
        .card {
            background: rgba(128, 128, 128, 0.05);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .question {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            line-height: 1.4;
        }
        .btn-option {
            display: block;
            width: 100%;
            padding: 14px;
            margin-bottom: 10px;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            border: 1px solid var(--tg-theme-hint-color);
            border-radius: 8px;
            text-align: left;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            line-height: 1.3;
        }
        .btn-option:active {
            transform: scale(0.98);
        }
        .rationale {
            display: none;
            padding: 14px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
            line-height: 1.4;
        }
        .correct { background-color: #4caf50 !important; color: white !important; border-color: #4caf50 !important; }
        .wrong { background-color: #f44336 !important; color: white !important; border-color: #f44336 !important; }
        .info-box { background-color: rgba(36, 129, 204, 0.1); color: var(--tg-theme-text-color); border-left: 4px solid var(--tg-theme-button-color); }
    </style>
</head>
<body>

    <div class="progress-bar">
        <div id="progress" class="progress-fill"></div>
    </div>

    <div id="quiz-container">
        <div class="card">
            <div id="question" class="question">Загрузка вопроса...</div>
        </div>
        <div id="options"></div>
        <div id="rationale" class="rationale info-box"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем Mini App на весь экран

        // База данных теста по уходу и трихологии (10 вопросов)
        const quizData = [
            {
                q: "При работе с поврежденным блондом мастер наносит состав с высоким содержанием свободных аминокислот. Какое главное условие необходимо соблюсти, чтобы эти активы удержались внутри структуры волоса, а не вымылись при первом же мытье?",
                options: [
                    { text: "Последующее применение технического продукта с кислым pH для закрытия кутикулы и фиксации за счет ионного притяжения.", isCorrect: true, text_r: "Правильно! Кислый уровень pH смещает заряд волоса к его изоэлектрической точке, максимально плотно закрывая чешуйки кутикулы и фиксируя низкомолекулярные активы внутри." },
                    { text: "Прогревание состава утюжком на температуре 230°C для полимеризации аминокислот.", isCorrect: false, text_r: "Неверно. Свободные аминокислоты не полимеризуются от высокой температуры, а экстремальный нагрев поврежденного блонда приведет лишь к пиролизу кератина." },
                    { text: "Предварительное нанесение шампуня глубокой очистки (ШГО) и выдержка его в течение 20 минут.", isCorrect: false, text_r: "Неверно. Длительная выдержка щелочного ШГО на блонде критически разрушит Клеточно-Мембранный Комплекс, ухудшая его способность удерживать уход." },
                    { text: "Смешивание аминокислотного состава с прямым пигментом для стабилизации.", isCorrect: false, text_r: "Неверно. Прямые пигменты адсорбируются на поверхности за счет физических сил и не влияют на удержание аминокислот в кортексе." }
                ]
            },
            {
                q: "Клиент жалуется, что после дорогого салонного ухода волосы стали жесткими, сухими и начали обламываться на концах. В чем кроется наиболее вероятная технологическая ошибка мастера?",
                options: [
                    { text: "Избыточное накопление высокомолекулярного протеина (перепротеинизация) без последующего размягчения липидами.", isCorrect: true, text_r: "Правильно! Протеины создают жесткий каркас. Если структуру перенасытить белком и не компенсировать это пластичными липидами, волос теряет эластичность и становится хрупким." },
                    { text: "Использование маски слишком низкого pH (pH = 5.5).", isCorrect: false, text_r: "Неверно. pH 5.5 является физиологическим и оптимальным для структуры, он не может вызвать стремительное разрушение." },
                    { text: "Плохое вымывание состава обычной теплой водой.", isCorrect: false, text_r: "Неверно. Остатки ухода могут дать жирность или тусклость, но не вызывают мгновенную ломкость кортекса." },
                    { text: "Нанесение термозащитного спрея перед сушкой феном.", isCorrect: false, text_r: "Неверно. Термозащитные полимеры, наоборот, призваны сглаживать тепловой удар и защищать белок от денатурации." }
                ]
            },
            {
                q: "Что происходит с гидрофобным барьером волоса (F-слоем), когда мастер регулярно использует ШГО перед каждой уходовой маской в кресле?",
                options: [
                    { text: "Щелочная среда постепенно смывает ковалентно связанную 18-метилейкозаноевую кислоту (18-MEA), делая волос гидрофильным и уязвимым.", isCorrect: true, text_r: "Правильно! Регулярное агрессивное щелочное воздействие разрушает липидный слой кутикулы, из-за чего волос теряет естественную защиту и начинает мгновенно впитывать и отдавать воду." },
                    { text: "Липидный слой уплотняется, ускоряя диффузию масел внутрь медуллы.", isCorrect: false, text_r: "Неверно. Щелочь разрушает липиды, а не уплотняет их; кроме того, медулла не участвует в сорбции косметических масел." },
                    { text: "Происходит регенерация клеточно-мембранного комплекса за счет ПАВ.", isCorrect: false, text_r: "Неверно. Анионные ПАВ в ШГО вымывают свободные жирные кислоты и холестерин, что ведет к деструкции, а не к регенерации КМК." },
                    { text: "Волос переходит в состояние абсолютной изоэлектрической нейтральности.", isCorrect: false, text_r: "Неверно. Изоэлектрическая точка находится в кислой среде (pH ~ 4.5-5.5), а ШГО уводит pH в щелочную область (7.0-8.0)." }
                ]
            },
            {
                q: "Мастер подбирает уход для волос с пористостью 5-й степени (критическое повреждение). Какие компоненты должны преобладать в рецептуре на первом этапе работы?",
                options: [
                    { text: "Низкомолекулярные гидролизованные протеины и аминокислоты в сочетании с компонентами, восполняющими КМК.", isCorrect: true, text_r: "Правильно! Критически поврежденный волос имеет разрушенный кортекс. Крупные молекулы внутрь не пройдут, поэтому нужны мелкие гидролизаты для заполнения пустот и липиды для их удержания." },
                    { text: "Натуральные нерафинированные масла кокоса и ши в чистом виде.", isCorrect: false, text_r: "Неверно. Чистые тяжелые масла создадут окклюзивную пленку на кутикуле, но не закроют дефицит белка в разрушенном кортексе, сделав волос сухим внутри." },
                    { text: "Высокомолекулярные силиконы (Dimethicone) высокой вязкости.", isCorrect: false, text_r: "Неверно. Силиконы дают отличный визуальный эффект на поверхности, но не несут структурного восстановления, необходимого на первом этапе." },
                    { text: "Кислотные пилинги на основе гликолевой кислоты с pH = 2.0.", isCorrect: false, text_r: "Неверно. Агрессивные кислые пилинги предназначены для кожи головы, на поврежденной длине они могут вызвать избыточное сжатие и ломкость." }
                ]
            },
            {
                q: "Для чего в профессиональных масках используется комбинация жирных спиртов (Cetearyl/Cetyl Alcohol) и катионных ПАВ (Behentrimonium Chloride / Cetrimonium Chloride)?",
                options: [
                    { text: "Для создания ламеллярной эмульсии, имитирующей структуру Клеточно-Мембранного Комплекса волоса для направленного восстановления.", isCorrect: true, text_r: "Правильно! Жирные спирты и катионные ПАВ образуют упорядоченные пласты (ламеллы), которые встраиваются в поврежденные липидные слои волоса, возвращая ему мягкость." },
                    { text: "Для химического растворения остатков силиконов со стержня волоса.", isCorrect: false, text_r: "Неверно. Данные компоненты не являются растворителями; силиконы удаляются сульфатными или специальными очищающими шампунями." },
                    { text: "Для инициирования экзотермической реакции с выделением тепла.", isCorrect: false, text_r: "Неверно. Эта комбинация формирует классическую стабильную эмульсию и не выделяет тепловую энергию при нанесении." },
                    { text: "Для глубокого проникновения в луковицу и стимуляции роста волос.", isCorrect: false, text_r: "Неверно. Катионные ПАВ предназначены для работы со стержнем волоса (длиной) и не должны втираться в кожу головы, чтобы не вызвать раздражения." }
                ]
            },
            {
                q: "Как влияет жесткая салонная вода, содержащая избыток ионов кальция и магния, на эффективность процедур глубокого ухода?",
                options: [
                    { text: "Двухвалентные металлы связываются с карбоксильными группами кератина, образуя нерастворимые комплексы, блокирующие проникновение уходовых активов.", isCorrect: true, text_r: "Правильно! Соли жесткости оседают на волосах в виде налета, забивают поры кутикулы, делают волос жестким и мешают маскам проникнуть внутрь." },
                    { text: "Ионы металлов катализируют синтез дисульфидных связей, укрепляя структуру.", isCorrect: false, text_r: "Неверно. Металлы из воды не участвуют в восстановлении серных мостиков, а лишь создают оседающий барьер." },
                    { text: "Жесткая вода полностью нейтрализует действие любых катионных ПАВ за счет инверсии заряда.", isCorrect: false, text_r: "Неверно. Катионные ПАВ сохраняют свой заряд, но им становится труднее адсорбироваться на поверхности, покрытой слоем минеральных отложений." },
                    { text: "Ионы магния ускоряют высыхание волос при сушке феном в 2 раза.", isCorrect: false, text_r: "Неверно. Минеральный налет удерживает влагу хаотично, делая просушивание неравномерным." }
                ]
            },
            {
                q: "При сушке волос феном после процедуры ухода мастер пренебрегает использованием несмываемого крема с функцией термозащиты. К какому скрытому процессу в кортексе это приводит при температуре выше 140°C?",
                options: [
                    { text: "Денатурация альфа-спиралей кератина с необратимым переходом в бета-складки и потерей конституционной влаги.", isCorrect: true, text_r: "Правильно! Без защитного экрана высокая температура разрушает хрупкие водородные и ионные связи кристаллической структуры белка, делая повреждения необратимыми." },
                    { text: "Мгновенное испарение пигментов меланина через кутикулу.", isCorrect: false, text_r: "Неверно. Меланин химически стабилен при температурах сушки феном и не испаряется физически из кортекса." },
                    { text: "Самопроизвольное омыление свободных жирных кислот КМК.", isCorrect: false, text_r: "Неверно. Омыление — это реакция жиров со щелочью, от одного тепла без участия сильного основания этот процесс не происходит." },
                    { text: "Переход аморфного кортекса в жидкую фазу.", isCorrect: false, text_r: "Неверно. Кератин волоса — твердое полимерное вещество, он подвергается деструкции и сгоранию, но не плавится." }
                ]
            },
            {
                q: "Каким образом активы из группы «плексов» (например, на основе малеановой кислоты или её производных) дополняют действие классических липидных масок?",
                options: [
                    { text: "Они работают на молекулярном уровне в кортексе, создавая новые ковалентные сшивки между разрученными цепочками, пока маска восстанавливает липидный КМК.", isCorrect: true, text_r: "Правильно! Плексы восстанавливают внутренний каркас (химические связи), а маски — межклеточный цемент (липиды и влагу). Это два абсолютно разных, но дополняющих друг друга уровня восстановления." },
                    { text: "Они служат катализатором для ускорения впитывания растительных масел.", isCorrect: false, text_r: "Неверно. Плексы не влияют на скорость диффузии триглицеридов, их цель — самостоятельное связывание сульфгидрильных групп." },
                    { text: "Плексы растворяют избыток протеинов, предотвращая перепротеинизацию.", isCorrect: false, text_r: "Неверно. Они не обладают протеолитическим действием и не разрушают белки ухода." },
                    { text: "Они временно заменяют кутикулярные чешуйки за счет полимеризации на воздухе.", isCorrect: false, text_r: "Неверно. Плексы работают преимущественно внутри кортекса и не образуют плотных поверхностных пленок." }
                ]
            },
            {
                q: "Мастер наносит маску с pH 3.0 на сильно поврежденные пористые волосы сразу после обесцвечивания. К какому нежелательному физическому эффекту может привести такой резкий скачок pH?",
                options: [
                    { text: "Избыточное, слишком резкое сжатие кутикулярного слоя, приводящее к хрупкости и «стекленению» поврежденных кончиков.", isCorrect: true, text_r: "Правильно! Слишком резкий переход от глубокого щелочного набухания к сильному закислению вызывает спазм структуры, из-за чего хрупкий волос может просто обломаться." },
                    { text: "Мгновенное закипание остатков перекиси водорода внутри кортекса.", isCorrect: false, text_r: "Неверно. Кислый pH, наоборот, стабилизирует перекись, замедляя её разложение." },
                    { text: "Полная нейтрализация искусственного фиолетового пигмента.", isCorrect: false, text_r: "Неверно. Кислый pH способствует удержанию пигментов, но физический стресс для самого волоса здесь опаснее." },
                    { text: "Превращение кератина в водорастворимую форму.", isCorrect: false, text_r: "Неверно. В водорастворимую форму кератин переходит при экстремально щелочном pH, кислая среда делает его максимально нерастворимым." }
                ]
            },
            {
                q: "Почему использование уходовых средств с высоким содержанием натуральных масел непосредственно перед процедурой тонирования блонда часто приводит к грязному или «пятнистому» результату?",
                options: [
                    { text: "Молекулы триглицеридов забивают пористые участки неравномерно, создавая гидрофобный барьер, который блокирует диффузию молекул красителя.", isCorrect: true, text_r: "Правильно! Масла создают пленку. Там, где волос был более поврежден, масла впиталось больше — в итоге краситель на водной основе просто не может проникнуть в эти зоны, и цвет ложится пятнами." },
                    { text: "Натуральные маски вступают в химическую реакцию поликонденсации с аммиаком.", isCorrect: false, text_r: "Неверно. Масла не полимеризуются с компонентами красителя, они лишь физически препятствуют его проникновению." },
                    { text: "Растительные жиры полностью обесцвечивают молекулы пигментов за счет окисления.", isCorrect: false, text_r: "Неверно. Масла не содержат свободных радикалов кислорода и не способны окислять пигмент." },
                    { text: "Масла смещают pH красителя из щелочной зоны в сильнокислую.", isCorrect: false, text_r: "Неверно. Косметические масла нейтральны и не имеют свободных ионов водорода, поэтому они не могут изменить pH щелочной смеси красителя." }
                ]
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        function loadQuestion() {
            answered = false;
            document.getElementById('rationale').style.display = 'none';
            tg.MainButton.hide();

            const qData = quizData[currentQuestion];
            document.getElementById('question').innerText = `Вопрос ${currentQuestion + 1}/${quizData.length}: ${qData.q}`;
            
            // Прогресс бар
            document.getElementById('progress').style.width = `${((currentQuestion) / quizData.length) * 100}%`;

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';

            qData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                btn.innerText = opt.text;
                btn.onclick = () => selectOption(btn, opt);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(element, option) {
            if (answered) return; 
            answered = true;

            const ratBox = document.getElementById('rationale');
            ratBox.innerText = option.text_r;
            ratBox.style.display = 'block';

            if (option.isCorrect) {
                element.classList.add('correct');
                score++;
            } else {
                element.classList.add('wrong');
                // Подсвечиваем верный вариант
                Array.from(document.getElementById('options').children).forEach((btn, i) => {
                    if(quizData[currentQuestion].options[i].isCorrect) btn.classList.add('correct');
                });
            }

            tg.MainButton.setText(currentQuestion + 1 < quizData.length ? "СЛЕДУЮЩИЙ ВОПРОС" : "ЗАВЕРШИТЬ ТЕСТ");
            tg.MainButton.show();
        }

        tg.onEvent('mainButtonClicked', function() {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                document.getElementById('progress').style.width = '100%';
                
                // Отправляем строку в PuzzleBot: /quiz_result_Баллы_Всего (Например: /quiz_result_7_10)
                tg.sendData(`/quiz_result_${score}_${quizData.length}`);
                
                tg.close(); // Закрываем Mini App
            }
        });

        loadQuestion();
    </script>
</body>
</html>
